services:
  anvil:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anvil-fork
    command: >
      anvil
      --fork-url ${ARBITRUM_RPC_URL}
      --port 8545
      --block-time 1
      --host 0.0.0.0
    ports:
      - "8545:8545"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quant-app
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - .:/app
      - /tmp:/tmp
    env_file:
      - .env
    stdin_open: true
    tty: true
